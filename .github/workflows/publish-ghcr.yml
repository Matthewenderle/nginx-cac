name: Publish image to GHCR

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate server certificate
        run: |
          openssl ecparam -genkey -name prime256v1 -out key.pem
          openssl req -batch -sha256 -days 365 \
            -new -x509 -key key.pem -out certificate.pem \
            -subj "/C=US/ST=Vulcan/O=DemoClientSSL/CN=localhost"

      - name: Download DoD trust chain
        run: |
          ROOT_CERTS=Certificates_PKCS7_v5_14_DoD
          ROOT_CERTS_FILE_NAME=unclass-certificates_pkcs7_DoD
          curl -s -o "${ROOT_CERTS_FILE_NAME}.zip" "https://dl.dod.cyber.mil/wp-content/uploads/pki-pke/zip/${ROOT_CERTS_FILE_NAME}.zip"
          unzip -p "${ROOT_CERTS_FILE_NAME}.zip" "${ROOT_CERTS}/${ROOT_CERTS}.der.p7b" \
            | openssl pkcs7 -inform der -out DoDRoots.crt -print_certs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nginx-cac
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
