server { 
  listen          80;
  server_name     planechart.enderle.io;
  access_log stdout main;
  error_log stderr debug;

  root /www/data;
  #index index.html index.htm;

  location /healthcheck {
    access_log off;
    return 200;
  }

  # redirect server error pages to the static page /50x.html
  #
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }

  # Let's Encrypt HTTP-01 challenge endpoint (no client cert required).
  location ^~ /.well-known/acme-challenge/ {
    default_type "text/plain";
      root /var/www/certbot;
      # First attempt to serve request as file, then
      # as directory, then fall back to displaying a 404.
      try_files $uri $uri/ =404;
  }

  # Everything else should go to HTTPS.
  location / {
      return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2 default_server;
  listen [::]:443 ssl http2 default_server;
  server_name planechart.enderle.io;
  allow all;
  access_log stdout main;
  error_log stderr debug;

  set $appContainer       "app-test-app-1:3000";
  set $version        "0.1.20";

  ssl_certificate     /etc/letsencrypt/live/planechart.enderle.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/planechart.enderle.io/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  ssl_ciphers         HIGH:!aNULL:!MD5;
  #ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

  # CAC is optional because it's not the only way
  ssl_verify_client optional;
  ssl_verify_depth 4; # Allow intermediate CAs
  ssl_client_certificate /etc/nginx/certs/dod/DoDRoots.crt;

  # OCSP stapling
  #ssl_stapling on;          # selfsigned=off
  #ssl_stapling_verify on;   # selfsigned=off

  # Inform the proxyed app which user had connected to this TLS endpoint
  add_header X-Subject-DN $ssl_client_s_dn;
  add_header X-Client-Verified $ssl_client_verify;
  add_header X-Client-Cert-Present $client_cert_present;

  # HSTS (ngx_http_headers_module is required)
  add_header Strict-Transport-Security max-age=15768000;
  add_header Access-Control-Allow-Origin https://*.enderle.io;
  add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, DELETE, PUT';
  add_header Access-Control-Allow-Credentials true;
  #add_header 'Access-Control-Allow-Headers' 'User-Agent,Keep-Alive,Content-Type';

  # OCSP stapling
  #ssl_stapling on;          # selfsigned=off
  #ssl_stapling_verify on;   # selfsigned=off

  root /www/data;

  # redirect server error pages to the static page /50x.html
  #
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }

  location = /auth/status {
    add_header Content-Type  "application/json" always;
    add_header Cache-Control "no-store"          always;
    return 200 "{\"verified\":$auth_verified,\"clientCertPresent\":$client_cert_present,\"verify\":\"$ssl_client_verify\",\"dn\":\"$ssl_client_s_dn\",\"serial\":\"$ssl_client_serial\"}";
  }

  location ^~ /_nuxt/ {
    resolver 127.0.0.11;
    proxy_pass http://$appContainer;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_set_header Accept-Encoding "";
    proxy_intercept_errors off;
  }

  location /api {
    ssi on;
    resolver                127.0.0.11;
    set $apiContainer          "app-test-app-1:3000";
    proxy_redirect          off;
    proxy_set_header        Host                  $host;
    proxy_set_header        X-Real-IP             $remote_addr;
    proxy_set_header        X-Scheme              $scheme;
    proxy_set_header        X-Forwarded-For       $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Host      $server_name;
    proxy_set_header        X-Forwarded-Protocol  https;
    proxy_set_header        X-SSL-User-DN         $ssl_client_s_dn;
    proxy_set_header        X-SSL-Authenticated   $ssl_client_verify;
    proxy_connect_timeout   60;
    proxy_read_timeout      60;
    #rewrite                ^/(.*)$ /$1 break;
    proxy_pass              http://$apiContainer;
  }

  location / {
    resolver 127.0.0.11;
    proxy_pass http://$appContainer;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_intercept_errors off;
  }
}