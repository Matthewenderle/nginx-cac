map $ssl_client_verify $client_cert_present {
    default 1;
    NONE    0;
}

map $ssl_client_verify $auth_verified {
    SUCCESS true;
    default false;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ${SERVER_NAME};

    access_log stdout main;
    error_log stderr debug;

    location /healthcheck {
        access_log off;
        return 200;
    }

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
        try_files $uri $uri/ =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;

    server_name ${SERVER_NAME};

    ${HTTP2_DIRECTIVE}

    access_log stdout main;
    error_log stderr debug;

    ssl_certificate     ${SSL_CERTIFICATE};
    ssl_certificate_key ${SSL_CERTIFICATE_KEY};
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    ssl_verify_client ${SSL_VERIFY_CLIENT};
    ssl_verify_depth 4;
    ssl_client_certificate /etc/nginx/DoDRoots.crt;

    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Subject-DN $ssl_client_s_dn always;
    add_header X-Client-Verified $ssl_client_verify always;
    add_header X-Client-Cert-Present $client_cert_present always;

    resolver 127.0.0.11 ipv6=off valid=300s;
    resolver_timeout 5s;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    location = /auth/status {
        add_header Content-Type "application/json" always;
        add_header Cache-Control "no-store" always;
        return 200 "{\"verified\":$auth_verified,\"clientCertPresent\":$client_cert_present,\"verify\":\"$ssl_client_verify\",\"dn\":\"$ssl_client_s_dn\",\"serial\":\"$ssl_client_serial\"}";
    }

    location = /auth/success {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Accept-Encoding "identity";

        proxy_set_header X-Subject-DN $ssl_client_s_dn;
        proxy_set_header X-Client-Verified $ssl_client_verify;
        proxy_set_header X-Client-Serial $ssl_client_serial;
        proxy_set_header X-Client-Cert-Present $client_cert_present;

        proxy_set_header X-SSL-User-DN $ssl_client_s_dn;
        proxy_set_header X-SSL-Authenticated $ssl_client_verify;
        proxy_set_header X-SSL-Client-Serial $ssl_client_serial;

        proxy_pass http://app:3000;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Accept-Encoding "identity";

        proxy_set_header X-Subject-DN $ssl_client_s_dn;
        proxy_set_header X-Client-Verified $ssl_client_verify;
        proxy_set_header X-Client-Serial $ssl_client_serial;
        proxy_set_header X-Client-Cert-Present $client_cert_present;

        proxy_set_header X-SSL-User-DN $ssl_client_s_dn;
        proxy_set_header X-SSL-Authenticated $ssl_client_verify;
        proxy_set_header X-SSL-Client-Serial $ssl_client_serial;

        proxy_pass http://app:3000;
    }
}