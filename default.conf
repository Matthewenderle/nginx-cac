map $ssl_client_verify $client_cert_present {
    default 1;
    NONE    0;
}

map $ssl_client_verify $auth_verified {
    SUCCESS true;
    default false;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name ${SERVER_NAME};

    # Let's Encrypt HTTP-01 challenge endpoint (no client cert required).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Everything else should go to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    server_name ${SERVER_NAME};

    ${HTTP2_DIRECTIVE}

    ssl_certificate     ${SSL_CERTIFICATE};
    ssl_certificate_key ${SSL_CERTIFICATE_KEY};
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

__RECHECK_CAC_SETTINGS__

    ssl_verify_client ${SSL_VERIFY_CLIENT};
    ssl_verify_depth 4; # Allow intermediate CAs
    ssl_client_certificate /etc/nginx/DoDRoots.crt;

    add_header Strict-Transport-Security max-age=15768000;

    # Inform the proxyed app which user had connected to this TLS endpoint
    add_header X-Subject-DN $ssl_client_s_dn;
    add_header X-Client-Verified $ssl_client_verify;
    add_header X-Client-Cert-Present $client_cert_present;

    root /www/data;

    # Needed when using proxy_pass with a variable (used for POST_AUTH_PROXY_UPSTREAM).
    # Also disables IPv6 resolution to avoid "Network unreachable" on IPv4-only hosts.
    # 127.0.0.11 is Docker's embedded DNS server (required for resolving Compose service names).
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 ipv6=off valid=300s;

    # Templated from POST_AUTH_REDIRECT_URI at container startup.
    set $post_auth_redirect_uri ${POST_AUTH_REDIRECT_URI};

__ROOT_LOCATION__

__POST_AUTH_TARGET_LOCATION__

__AUTH_STATUS_LOCATION__

__MAIN_LOCATION__
}
